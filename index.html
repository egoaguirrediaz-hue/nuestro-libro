<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nuestro Libro ❤️</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Fondo -->
    <div id="stars"></div>
   
    <div id="moon">
        <div class="moon-glow"></div>
    </div>

    <!-- Portada -->

    <main class="cover">

        <div class="book-cover">

            <h1>

                Nuestro Libro

            </h1>

            <p class="chapter">

                Capítulo II

            </p>

            <h2>

                Dos meses contigo ❤️

            </h2>

            <p>

                Porque las mejores historias...
                nunca terminan.

            </p>

            <button id="startButton">

                ❤️ Abrir nuestro libro

            </button>

        </div>

    </main>

    <audio id="music" loop>

        <source src="assets/music/piano.mp3" type="audio/mpeg">

    </audio>

    <script src="js/script.js"></script>

</body>

</html>
